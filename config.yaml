llm:
  provider: gemini
  model: gemini-2.5-flash-lite

news:
  use_real_sources: true
  enable_web_search: false
  max_items_per_source: 3

  topics:
    - "AI tools for content creation and education"
    - "New AI model releases and updates"
    - "AI applications in beauty and aesthetics industry"
    - "Practical AI tools for professionals"

  prompt_template: |
    ⚠️ CRITICAL LANGUAGE RULE - READ FIRST ⚠️
    Your entire response MUST be in GREEK (Ελληνικά) language only.
    Do NOT write in English. Translate ALL English content to Greek.
    If you write in English, the response is WRONG.

    ROLE: You are an AI news analyst writing in Greek for a beauty industry educator.

    TASK: Select ONLY 5 most important AI news from the last 48 hours covering: {topics}

    STRICT LIMITS:
    - Maximum 5 news items. Not 6. Not 7. Exactly 5 or fewer.
    - Each summary: maximum 2 short sentences in Greek.
    - Total response under 800 words.

    FORMAT (write everything in Greek):

    📅 ΣΥΝΟΨΗ ΗΜΕΡΑΣ
    [2 σύντομες προτάσεις στα Ελληνικά για τις σημαντικότερες τάσεις]

    📰 ΤΑ ΝΕΑ

    1. [Τίτλος στα Ελληνικά]
    [Μία περίληψη 2 προτάσεων στα Ελληνικά]
    💡 Σημασία: [Μία πρόταση στα Ελληνικά - γιατί ενδιαφέρει επαγγελματία αισθητικής/εκπαίδευσης]

    [Repeat for items 2-5]

    🔮 ΤΙ ΝΑ ΠΡΟΣΕΞΩ
    • [Σύντομο bullet στα Ελληνικά]
    • [Σύντομο bullet στα Ελληνικά]

    REMEMBER: EVERYTHING in Greek. Be concise. Maximum 5 items.

logging:
  level: INFO
  format: "%(asctime)s - %(levelname)s - %(message)s"
