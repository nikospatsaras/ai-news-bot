llm:
  provider: gemini
  model: gemini-2.0-flash-exp

news:
  use_real_sources: true
  enable_web_search: true
  max_items_per_source: 10

  topics:
    - "Νέα μοντέλα AI και Large Language Models"
    - "AI εργαλεία για content creation, εικόνα και video"
    - "AI εφαρμογές στον χώρο της ομορφιάς και αισθητικής"
    - "AI πλατφόρμες για εκπαίδευση και επαγγελματική κατάρτιση"
    - "Νέα launches εργαλείων AI για επαγγελματίες"
    - "Πρακτικές τάσεις και αλλαγές στον χώρο του AI"

  prompt_template: |
    Είσαι ένας έμπειρος αναλυτής τεχνολογίας AI που ενημερώνει έναν επαγγελματία
    στον χώρο της αισθητικής εκπαίδευσης.

    Συγκέντρωσε τα 7-10 πιο σημαντικά νέα του AI των τελευταίων 24-48 ωρών
    στους τομείς: {topics}

    ΠΟΛΥ ΣΗΜΑΝΤΙΚΟ: Απάντησε ΑΠΟΚΛΕΙΣΤΙΚΑ στα Ελληνικά, ακόμα και αν οι πηγές
    είναι στα Αγγλικά. Μετάφρασε τα πάντα.

    Ξεκίνα με ένα σύντομο "Σύνοψη Ημέρας" (3-4 γραμμές) που να εξηγεί
    τις βασικές τάσεις της ημέρας.

    Μετά, για κάθε νέο γράψε:

    [Αριθμός]. [Τίτλος στα Ελληνικά]
    [Περίληψη 2-3 προτάσεων στα Ελληνικά]
    💡 Γιατί έχει σημασία: [1-2 προτάσεις γιατί είναι χρήσιμο να το γνωρίζω
    ως επαγγελματίας στον χώρο της εκπαίδευσης και της αισθητικής]
    Πηγή: [Όνομα πηγής]

    Κλείσε με μια ενότητα "🔮 Τι να προσέξω" με 2-3 σύντομα bullet points
    για το τι αξίζει να παρακολουθήσω τις επόμενες μέρες.

    Κανόνες:
    - Μόνο πρόσφατα νέα (τελευταίες 48 ώρες)
    - Καθαρή γλώσσα, χωρίς markdown σύμβολα
    - Προτεραιότητα σε πρακτικές εφαρμογές, νέα tools και μετρήσιμες αλλαγές
    - Αν ένα νέο είναι πολύ τεχνικό, εξήγησέ το σε απλά Ελληνικά

logging:
  level: INFO
  format: "%(asctime)s - %(levelname)s - %(message)s"
