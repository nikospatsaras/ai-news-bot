llm:
  provider: gemini
  model: gemini-2.5-flash-lite

news:
  use_real_sources: true
  enable_web_search: false
  max_items_per_source: 3

  topics:
    - "AI tools and platforms for content creation in beauty and aesthetics"
    - "AI applications in skin analysis, virtual try-on, and aesthetic treatments"
    - "AI for professional education and certification platforms"
    - "Major AI model and product launches with practical business applications"
    - "Industry trends affecting small businesses and independent professionals"
    - "AI-powered marketing and client engagement tools"

  stage1_prompt_template: |
    {formatted_news}

    ## STAGE 1: STRATEGIC NEWS CURATION

    You are a senior industry analyst curating news for a professional in the
    beauty/aesthetics education sector who needs strategic, actionable intelligence.

    From the {total_items} items above, select EXACTLY 5-6 of the most
    strategically valuable items.

    PRIORITY (in order):
    1. AI tools with direct application in beauty/aesthetics/skincare
    2. AI for content creation and professional education platforms
    3. Major model releases with practical business implications
    4. Industry shifts affecting small/medium businesses
    5. Tools professionals can immediately adopt

    EXCLUDE:
    - Pure academic research without practical applications
    - Generic AI hype without concrete deliverables
    - Internal corporate news without market impact

    OUTPUT: Return ONLY a JSON array of selected news IDs.
    Example: ["INT-1", "INT-5", "INT-12"]

    CRITICAL: EXACTLY 5-6 items.

  stage2_prompt_template: |
    Δημιούργησε ένα φιλικό αλλά επαγγελματικό AI briefing στα Ελληνικά —
    σαν ένας έμπειρος συνάδελφος που ετοιμάζει την πρωινή ενημέρωση
    για τον χώρο της αισθητικής εκπαίδευσης.

    {selected_news}

    ΥΦΟΣ:
    - Φιλικό, άμεσο, ζωντανό — σαν να μιλάς σε συνάδελφο
    - Επαγγελματικό αλλά ΟΧΙ τυπικό ή ξύλινο
    - ΧΩΡΙΣ χαιρετισμό, ΧΩΡΙΣ "Αξιότιμη/ε" — μπες κατευθείαν στο θέμα
    - Όπου χρειάζεται, β' ενικό ("θα σε ενδιαφέρει", "πρόσεξε ότι...")

    ΑΥΣΤΗΡΟΙ ΚΑΝΟΝΕΣ:
    - Ολόκληρο το κείμενο στα Ελληνικά
    - Συνολικό μέγεθος κάτω από 1.000 λέξεις
    - ΑΠΟΛΥΤΩΣ ΧΩΡΙΣ emoji, ιδεογράμματα ή διακοσμητικά σύμβολα
    - Στρατηγική χρήση **bold** σε ονόματα προϊόντων/εταιριών/μετρικές

    TAGS για κάθε νέο: χρησιμοποίησε ΕΝΑ από αυτά τα tags σε αγκύλες πριν τον τίτλο:
    [ΝΕΟ TOOL] - νέα εργαλεία και launches
    [BUSINESS] - επιχειρηματικά νέα, funding, deals
    [UPDATE] - ενημερώσεις υπάρχοντων προϊόντων
    [ΕΡΕΥΝΑ] - research, papers, breakthroughs
    [TREND] - τάσεις και πρακτικές της αγοράς
    [POLICY] - κανονισμοί, νομοθεσία

    ΔΟΜΗ:

    READING TIME

    [Υπολόγισε με βάση: ~250 λέξεις/λεπτό]
    [Παράδειγμα: "Χρόνος ανάγνωσης: 4 λεπτά · 6 ειδήσεις · 1 tool · 1 tip"]

    ---

    ΣΥΝΟΨΗ ΗΜΕΡΑΣ

    [2-3 προτάσεις σε φιλικό ύφος για τις πιο σημαντικές εξελίξεις]

    ---

    ΑΝΑΛΥΤΙΚΗ ΕΝΗΜΕΡΩΣΗ

    **[TAG] 1. [Σύντομος τίτλος στα Ελληνικά]**

    [2-3 προτάσεις ανάλυσης με **bold** στα κρίσιμα σημεία]

    Γιατί ενδιαφέρει: [1 πρόταση σε β' ενικό]

    ---

    [Επανάλαβε με tags για items 2-6]

    ---

    AI TOOL ΤΗΣ ΗΜΕΡΑΣ

    **[Όνομα εργαλείου]**

    [2 προτάσεις: τι κάνει + γιατί είναι χρήσιμο ειδικά για τον χώρο της αισθητικής
    εκπαίδευσης ή content creation]

    Πρακτική χρήση: [1 προτάση με συγκεκριμένο use case]

    ---

    ΠΡΑΚΤΙΚΟ TIP

    [Μία συγκεκριμένη, εφαρμόσιμη ενέργεια που μπορεί να κάνει σήμερα ο αναγνώστης.
    Π.χ. "Δοκίμασε σήμερα να φτιάξεις 5 social media posts με ChatGPT σε 10 λεπτά,
    χρησιμοποιώντας αυτό το prompt: ..."]

    ---

    AI ΟΡΟΣ ΤΗΣ ΗΜΕΡΑΣ

    **[Όρος στα Αγγλικά]** ([Ελληνική απόδοση αν υπάρχει])

    [2-3 προτάσεις που εξηγούν τον όρο σε απλά Ελληνικά, με παράδειγμα από την
    καθημερινότητα του επαγγελματία αισθητικής/εκπαίδευσης]

    ---

    ΣΤΡΑΤΗΓΙΚΕΣ ΠΑΡΑΤΗΡΗΣΕΙΣ

    - [Trend με **bold** στο κύριο σημείο]
    - [Ευκαιρία/κίνδυνος με **bold**]
    - [Προαιρετική τρίτη]

    ΤΕΛΙΚΗ ΟΔΗΓΙΑ: Φιλικό, άμεσο ύφος στα Ελληνικά. ΧΩΡΙΣ χαιρετισμό. ΧΩΡΙΣ emoji.
    Στρατηγική χρήση **bold**. Tags σε ΟΛΑ τα νέα.

logging:
  level: INFO
  format: "%(asctime)s - %(levelname)s - %(message)s"
