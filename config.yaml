llm:
  provider: gemini
  model: gemini-2.5-flash

news:
  use_real_sources: true
  enable_web_search: false
  max_items_per_source: 3

  topics:
    - "AI tools and platforms for content creation in beauty and aesthetics"
    - "AI applications in skin analysis, virtual try-on, and aesthetic treatments"
    - "AI for professional education and certification platforms"
    - "Major AI model and product launches with practical business applications"
    - "Industry trends affecting small businesses and independent professionals"
    - "AI-powered marketing and client engagement tools"

  stage1_prompt_template: |
    {formatted_news}

    ## STAGE 1: STRATEGIC NEWS CURATION

    You are a senior industry analyst curating news for a professional in the
    beauty/aesthetics education sector who needs strategic, actionable intelligence.

    From the {total_items} items above, select EXACTLY 5-6 of the most
    strategically valuable items.

    PRIORITY (in order):
    1. AI tools with direct application in beauty/aesthetics/skincare
    2. AI for content creation and professional education platforms
    3. Major model releases with practical business implications
    4. Industry shifts affecting small/medium businesses
    5. Tools professionals can immediately adopt

    EXCLUDE:
    - Pure academic research without practical applications
    - Generic AI hype without concrete deliverables
    - Internal corporate news without market impact

    OUTPUT: Return ONLY a JSON array of selected news IDs.
    Example: ["INT-1", "INT-5", "INT-12"]

    CRITICAL: EXACTLY 5-6 items.

  stage2_prompt_template: |
    Δημιούργησε ένα επαγγελματικό briefing AI νέων στα Ελληνικά για στέλεχος
    του χώρου της αισθητικής εκπαίδευσης.

    {selected_news}

    ΥΦΟΣ:
    - Επαγγελματικό, αναλυτικό — σαν εκτελεστικό briefing
    - Συγκεκριμένο, με ουσία — όχι γενικότητες ή AI buzzwords
    - Με έμφαση σε πρακτικές επιπτώσεις και επιχειρηματικές ευκαιρίες

    ΑΥΣΤΗΡΟΙ ΚΑΝΟΝΕΣ:
    - Ολόκληρο το κείμενο στα Ελληνικά (μετάφρασε ό,τι είναι στα Αγγλικά)
    - Κάθε νέο: 2-3 ουσιαστικές προτάσεις ανάλυσης
    - Συνολικό μέγεθος κάτω από 800 λέξεις
    - ΑΠΟΛΥΤΩΣ ΧΩΡΙΣ emoji, ιδεογράμματα ή διακοσμητικά σύμβολα
    - Απόφυγε generic phrases ("επαναστατικό", "θα αλλάξει τα πάντα", "game-changer")

    ΣΤΡΑΤΗΓΙΚΗ ΧΡΗΣΗ BOLD (**...**):
    Χρησιμοποίησε **bold** ΕΠΙΛΕΚΤΙΚΑ μέσα στις παραγράφους για:
    - Ονόματα προϊόντων/μοντέλων (π.χ. **Claude Opus 4.7**, **GPT-5**, **Gemini 3 Pro**)
    - Ονόματα εταιριών όταν είναι κεντρικές (π.χ. **Anthropic**, **OpenAI**, **Google**)
    - Σημαντικά νούμερα και μετρικές (π.χ. **200% αύξηση**, **$10 δισ.**)
    - Κρίσιμες έννοιες ή ορολογία (π.χ. **autonomous agents**, **multimodal AI**)
    - ΠΟΤΕ ολόκληρες προτάσεις σε bold — μόνο 2-4 λέξεις κάθε φορά
    - Σκοπός: ο αναγνώστης να σαρώνει το email και να εντοπίζει τα κρίσιμα σημεία σε 5 δευτερόλεπτα

    ΔΟΜΗ:

    ΣΥΝΟΨΗ ΗΜΕΡΑΣ

    [2-3 προτάσεις: οι πιο σημαντικές εξελίξεις και τι σημαίνουν στρατηγικά.
    Με **bold** στα κύρια ονόματα/concepts]

    ---

    ΑΝΑΛΥΤΙΚΗ ΕΝΗΜΕΡΩΣΗ

    **1. [Ξεκάθαρος, σύντομος τίτλος στα Ελληνικά]**

    [2-3 προτάσεις ανάλυσης: τι συμβαίνει + επιχειρηματικό πλαίσιο.
    Με στρατηγική χρήση **bold** στα κρίσιμα σημεία]

    Επιχειρηματική σημασία: [1 πρόταση με **bold** στο πιο σημαντικό σημείο
    για επαγγελματία στον χώρο σου]

    ---

    **2. [Τίτλος]**

    [Συνεχίζεις με ίδια δομή για όλα τα items 2-6, χωρίζοντας με ---]

    ---

    ΣΤΡΑΤΗΓΙΚΕΣ ΠΑΡΑΤΗΡΗΣΕΙΣ

    - [Trend ή pattern με **bold** στο κύριο σημείο]
    - [Επιχειρηματική ευκαιρία/κίνδυνος με **bold** στο κρίσιμο σημείο]
    - [Προαιρετική τρίτη παρατήρηση]

    ΤΕΛΙΚΗ ΟΔΗΓΙΑ: Όλα στα Ελληνικά. Επαγγελματικός τόνος. ΧΩΡΙΣ emoji.
    Στρατηγική χρήση **bold** για visual hierarchy.

logging:
  level: INFO
  format: "%(asctime)s - %(levelname)s - %(message)s"
