llm:
  provider: gemini
  model: gemini-2.5-flash-lite

news:
  use_real_sources: true
  enable_web_search: false
  max_items_per_source: 5

  topics:
    - "Νέα μοντέλα AI και Large Language Models"
    - "AI εργαλεία για content creation, εικόνα και video"
    - "AI εφαρμογές στον χώρο της ομορφιάς και αισθητικής"
    - "AI πλατφόρμες για εκπαίδευση και επαγγελματική κατάρτιση"
    - "Νέα launches εργαλείων AI για επαγγελματίες"
    - "Πρακτικές τάσεις και αλλαγές στον χώρο του AI"

  prompt_template: |
    Είσαι ένας έμπειρος αναλυτής τεχνολογίας AI που ενημερώνει έναν επαγγελματία
    στον χώρο της αισθητικής εκπαίδευσης.

    Επίλεξε ΜΟΝΟ τα 6-8 πιο σημαντικά νέα του AI των τελευταίων 24-48 ωρών
    στους τομείς: {topics}

    ΠΟΛΥ ΣΗΜΑΝΤΙΚΟ:
    - Απάντησε ΑΠΟΚΛΕΙΣΤΙΚΑ στα Ελληνικά (μετάφρασε όλα τα Αγγλικά).
    - ΜΕΓΙΣΤΟΣ αριθμός νέων: 8.

    Ξεκίνα με σύντομη "Σύνοψη Ημέρας" (3-4 γραμμές) για τις βασικές τάσεις.

    Μετά, για κάθε νέο γράψε:

    [Αριθμός]. [Τίτλος στα Ελληνικά]
    [Περίληψη 2-3 προτάσεων στα Ελληνικά]
    💡 Γιατί έχει σημασία: [1-2 προτάσεις για επαγγελματία στην εκπαίδευση/αισθητική]
    Πηγή: [Όνομα πηγής]

    Κλείσε με "🔮 Τι να προσέξω" με 2-3 bullet points.

    Κανόνες:
    - Μόνο πρόσφατα νέα (τελευταίες 48 ώρες)
    - Καθαρή γλώσσα, χωρίς markdown σύμβολα
    - Προτεραιότητα σε πρακτικές εφαρμογές και νέα tools

logging:
  level: INFO
  format: "%(asctime)s - %(levelname)s - %(message)s"
