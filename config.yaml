llm:
  provider: gemini
  model: gemini-2.5-flash-lite

news:
  use_real_sources: true
  enable_web_search: false
  max_items_per_source: 3

  topics:
    - "AI tools for content creation"
    - "New AI model releases"
    - "AI for beauty and aesthetics industry"
    - "Practical AI tools for professionals"

  stage1_prompt_template: |
    {formatted_news}

    ## YOUR TASK - STAGE 1: NEWS SELECTION

    You are an AI industry analyst. From the {total_items} news items above,
    select ONLY 5-6 of the most important items.

    SELECTION CRITERIA:
    - Major product launches or model releases
    - Practical AI tools that professionals can use
    - Significant industry shifts
    - Prefer items relevant to content creation, education, and beauty/aesthetics

    OUTPUT FORMAT:
    Return ONLY a JSON array of selected news IDs. No explanations.

    Example: ["INT-1", "INT-5", "INT-12"]

    CRITICAL: Select EXACTLY 5-6 items. Not more.

  stage2_prompt_template: |
    Δημιούργησε μια ΣΥΝΤΟΜΗ ενημέρωση AI νέων στα Ελληνικά για τα {count} επιλεγμένα νέα παρακάτω.

    {selected_news}

    ΑΥΣΤΗΡΟΙ ΚΑΝΟΝΕΣ:
    - Όλο το κείμενο ΑΠΟΚΛΕΙΣΤΙΚΑ στα Ελληνικά (μετάφρασε ό,τι είναι στα Αγγλικά)
    - Κάθε νέο: ΜΟΝΟ 2 προτάσεις περίληψη
    - Συνολικό κείμενο κάτω από 700 λέξεις
    - Χωρίς κατηγοριοποιήσεις, χωρίς headers με αριθμούς όπως "1. **Large Language Models**"

    ΔΟΜΗ:

    📅 ΣΥΝΟΨΗ ΗΜΕΡΑΣ
    [2 σύντομες προτάσεις στα Ελληνικά για τις βασικές τάσεις]

    📰 ΤΑ ΝΕΑ

    1. [Σύντομος τίτλος στα Ελληνικά]
    [2 προτάσεις περίληψη στα Ελληνικά]
    💡 Γιατί έχει σημασία: [1 πρόταση στα Ελληνικά για επαγγελματία αισθητικής/εκπαίδευσης]
    🔗 Πηγή: [όνομα πηγής με link]

    [Επανάλαβε για items 2-6]

    🔮 ΤΙ ΝΑ ΠΡΟΣΕΞΩ
    • [σύντομο bullet στα Ελληνικά]
    • [σύντομο bullet στα Ελληνικά]

    ΤΕΛΙΚΗ ΥΠΕΝΘΥΜΙΣΗ: Όλα στα Ελληνικά. Σύντομα. Max 5-6 νέα.

logging:
  level: INFO
  format: "%(asctime)s - %(levelname)s - %(message)s"
